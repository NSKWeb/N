{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
    <p class="tagline">Your simple, free, and privacy-friendly URL shortener.</p>

    <form action="{{ url_for('shorten') }}" method="POST" class="url-form">
        <input type="text" id="url" name="url" placeholder="Enter a long URL to shorten..." required>
        <button type="submit">Shorten</button>
    </form>

    {% if error %}
        <div class="result error">
            <p>{{ error }}</p>
        </div>
    {% endif %}

    {% if short_url %}
        <div class="result">
            <p>Here is your short URL:</p>
            <div class="short-url-container">
                <input type="text" value="{{ short_url }}" id="short_url" readonly>
                <button id="copy-btn">Copy</button>
            </div>
        </div>
    {% endif %}
{% endblock %}
